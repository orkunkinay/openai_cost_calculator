name: Check Model Pricing

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  pricing-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: python -m pip install -r requirements.txt

      - name: Check Pricing
        run: python scripts/check_pricing.py

      - name: Detect Pricing CSV Changes
        id: pricing_diff
        run: |
          if git diff --quiet -- data/gpt_pricing_data.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open Pricing Update PR
        if: steps.pricing_diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automated/pricing-update
          title: Update model pricing from upstream
          commit-message: Update model pricing from upstream
          body-path: pricing_diff.md
          labels: |
            pricing
            automated
          add-paths: |
            data/gpt_pricing_data.csv
