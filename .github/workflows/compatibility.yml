name: Compatibility Tests

on:
  schedule:
    - cron: "17 4 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compatibility:
    name: compatibility (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml

      - name: Install Dependencies
        run: python -m pip install -r requirements-dev.txt -e ".[proxy]"

      - name: Run Tests
        run: pytest
